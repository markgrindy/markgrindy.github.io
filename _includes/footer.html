<h1 class="footer-head">Latest Training Logs</h1>
{% for post in site.logs limit: 3 %}
  <p class="summary-separator"/>
  <div class="summary-wrapper">
    <a class="wrapper" href="{{ post.url }}">
      <article class="main">
        <p class="mini mini-footer">
          {{ post.description }}
          <span class="related-date">
            {% include timeAgo.html %}
          </span>
        </p>
      </article>
    </a>
  </div>
{% endfor %}
<div class="back-matter">
  <p>&copy;
    <script type="text/JavaScript">
      document.write(new Date().getFullYear());
    </script>
    {{ site.title }}
  </p>
  <p>
    {% for item in site.data.footerLinks %}
      <a href="{{ item.link }}">{{ item.name }}</a>
    {% endfor %}
  </p>
  </div>
