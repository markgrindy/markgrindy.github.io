<p class="summary-separator"/>
<div class="summary-wrapper">
  <a class="summary-a" href="{{ post.url }}">
    <h1 class="summary-title">
    {{ post.title }}
    </h1>
    <p class="summary-description">{{ post.description }}</p>
    <div class="summary-photo" style="background-image: url(http://localhost:4000/assets/post-img/2020-04-13-broken.png);" src="{{ post.image }}" alt="{{ page.caption }}"/>
    <p class="caption summary-caption">
      {% if post.image-credit-link %}
        {{ post.image-credit }}
      {% endif %}
    </p>
  </a>
</div>
