<p class="summary-separator"/>
<div class="summary-wrapper">
  <a class="wrapper" href="{{ post.url }}">
    <article class="main">
      <h1 class="summary-title mini">
      {{ post.title }}
      <p class="related-date">{{ post.date | date: "%B %e, %Y" }}</p>
      </h1>
    </article>
    <div class="aside" style="background-image: url({{ post.image }});">
      <!-- <img class="summary-photo mini" src="{{ post.image }}" alt="{{ page.caption }}"/> -->
    </div>
  </a>
</div>
