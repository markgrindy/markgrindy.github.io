---
layout: default
---
<h1>{{ page.title }}</h1>
<p>{{ page.description }}</p>
<img class="post-image" src="{{ page.image }}" alt="{{ page.caption }}">
{% if page.caption %}
  <p class="post-caption">{{ page.caption }}</p>
{% endif %}
<p>
  {% assign author = site.authors | where: 'short_name', page.author | first %}
  {% if author %}
    By <a href="{{ author.url }}">{{ author.name }}</a>
  {% endif %}
  • {{ page.date | date_to_string }}
</p>

{{ content }}
